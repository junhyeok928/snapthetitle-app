version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    command:
      - --innodb-buffer-pool-size=128M
      - --max-connections=30

  backend:
    build:
      context: ./snapthetitle-backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR}
      JWT_SECRET: ${JWT_SECRET}
      JAVA_OPTS: -Xms128m -Xmx256m
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/home/app/uploads
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    image: nginx:stable
    container_name: frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./snapthetitle/build:/usr/share/nginx/html:ro
      - ./snapthetitle/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./uploads:/home/app/uploads:ro
    networks:
      - app-network
    depends_on:
      - backend
    # 갱신된 인증서를 반영하기 위해 12시간마다 nginx reload
    command: /bin/sh -c "while :; do sleep 12h & wait $${!}; nginx -s reload; done & exec nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - app-network
    # 12시간마다 갱신 시도 (certbot이 만료 30일 이내인 인증서만 실제로 갱신)
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;"

volumes:
  mysql_data:
  backend_uploads:

networks:
  app-network:
    driver: bridge
